<head>
    <meta charset="UTF-8">

    <title>Coming Soon | WriteDesigner</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --orange: #ff8f00;
            --orange-light: #fff6ec;
            --gray-100: #f3f4f6;
            --gray-400: #9ca3af;
            --gray-600: #4b5563;
            --black: #000000;
            --white: #ffffff;
            --error: #ef4444;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--white);
            color: var(--black);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }

        .logo {
            width: 80px;
            margin: 0 auto 40px;
        }

        .logo svg {
            width: 100%;
            height: auto;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .subtext {
            font-size: 16px;
            color: var(--gray-600);
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 12px;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 1px solid transparent;
            background-color: var(--gray-100);
            font-family: inherit;
            font-size: 16px;
            outline: none;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: var(--orange);
        }

        .error-message {
            color: var(--error);
            font-size: 13px;
            margin: 8px 0;
            display: none;
        }

        .divider {
            font-size: 12px;
            color: var(--gray-400);
            margin: 16px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background-color: var(--gray-100);
        }

        .btn-join {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background-color: var(--black);
            color: var(--white);
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: opacity 0.2s;
            margin-top: 12px;
        }

        .btn-join:hover {
            opacity: 0.9;
        }

        .btn-join:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .social-buttons {
            display: flex;
            gap: 12px;
            margin-top: 40px;
        }

        .social-btn {
            flex: 1;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid var(--gray-100);
            background: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: 14px;
            font-weight: 500;
            color: var(--gray-600);
            text-decoration: none;
            cursor: pointer;
        }

        .social-btn:hover {
            background-color: var(--gray-100);
        }

        .icon {
            width: 18px;
            height: 18px;
        }

        #success-content {
            display: none;
        }
    </style>
</head>

    <script>
        const supabaseUrl = 'https://wukejyhnohzmytlibpyy.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Ind1a2VqeWhub2h6bXl0bGlicHl5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2MzIxNTQsImV4cCI6MjA4OTIwODE1NH0.JkQoYnlO3VJulETj70EZErueLV-NswAOqicdIB3rjG0';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        const form = document.getElementById('waitlist-form');
        const emailInput = document.getElementById('email');
        const phoneInput = document.getElementById('phone');
        const errorMsg = document.getElementById('error-msg');
        const mainContent = document.getElementById('main-content');
        const successContent = document.getElementById('success-content');
        const submitBtn = document.getElementById('submit-btn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = emailInput.value.trim();
            const phone = phoneInput.value.trim();

            if (!email && !phone) {
                errorMsg.textContent = 'Please provide either an email or phone number.';
                errorMsg.style.display = 'block';
                return;
            }

            errorMsg.style.display = 'none';
            submitBtn.disabled = true;
            submitBtn.textContent = 'Joining...';

            try {
                const { data, error } = await supabase
                    .from('waitlist')
                    .insert([{ email: email || null, phone: phone || null, user_agent: navigator.userAgent }]);

                if (error) {
                    errorMsg.textContent = 'Error: ' + error.message;
                    errorMsg.style.display = 'block';
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Join Waitlist';
                    return;
                }

                mainContent.style.display = 'none';
                successContent.style.display = 'block';
                
            } catch (err) {
                errorMsg.textContent = 'Network error. Please try again.';
                errorMsg.style.display = 'block';
                submitBtn.disabled = false;
                submitBtn.textContent = 'Join Waitlist';
            }
        });

        emailInput.addEventListener('input', () => errorMsg.style.display = 'none');
        phoneInput.addEventListener('input', () => errorMsg.style.display = 'none');
    </script>
